spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # or "validate" in strict production
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}